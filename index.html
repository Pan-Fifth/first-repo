<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My spotifer (tailwind)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="bg-gradient-to-b from-pink-200 to-black fixed inset-0 -z-10"></div>
    <div class="text-white p-4 min-h-screen w-full">
        <!-- ตรงนี้คือส่วนหัวจ้า -->
        <div class="flex flex-col items-center">
            <h1 class="text-2xl m-2">My spotifer</h1>
            <img class="w-[100px] rounded-full" src="https://picsum.photos/200" alt="">
            <button class="cursor-pointer mt-4 bg-slate-400 px-4 py-1.5 rounded-3xl">edit profile</button>
        </div>

        <!-- ส่วนข้อมูลตัวเลข -->
        <div class="flex justify-around my-4">
            <div class="text-center w-[100px]">
                <p>23</p>
                <p class="text-xs">PLAYLISTS</p>
            </div>

            <div class="text-center w-[100px]">
                <p>1500</p>
                <p class="text-xs">FOLLOWERS</p>
            </div>

            <div class="text-center w-[100px]">
                <p>43</p>
                <p class="text-xs">FOLLOWING</p>
            </div>
        </div>



        <!-- ส่วนของเพลย์ลิสท์ -->
        <h1 class="text-xl font-bold">Playlists</h1>


        <div class="flex items-center my-2">
            <img class="w-[40px] rounded-md" src="https://picsum.photos/200" alt="">

            <div class="w-full ml-2">
                <p>Allie in the sea</p>
                <p class="text-xs">100 likes</p>
            </div>

            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="flex items-center my-2">
            <img class="w-[40px] rounded-md" src="https://picsum.photos/200" alt="">

            <div class="w-full ml-2">
                <p>Hello from the other side</p>
                <p class="text-xs">100 likes</p>
            </div>

            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <p class="text-lg">See all playlist</p>

        <!-- ส่วน footer  -->


    </div>

    <div class="flex justify-around bg-slate-50 fixed bottom-0 w-full py-2">
        <div class="flex flex-col items-center">
            <i class="fa-regular fa-house"></i>
            <p>Home</p>
        </div>

        <div class="flex flex-col items-center">
            <i class="fa-solid fa-magnifying-glass"></i>
            <p>Seach</p>
        </div>

        <div class="flex flex-col items-center">
            <i class="fa-solid fa-book"></i>
            <p>Your library</p>
        </div>

    </div>
</body>

</html>
